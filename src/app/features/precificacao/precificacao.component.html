<div class="precificacao-inner">
  <div class="container">
    <div class="layout">
      <div class="page-header-wrap">
        @for (tab of tabs; track tab.id) {
          <header class="page-header" [class.active]="activeTab() === tab.id" [attr.data-tab]="tab.id">
            <h2>{{ tab.title }}</h2>
            <div class="sub" [innerHTML]="tab.desc"></div>
          </header>
        }
      </div>

      <main class="main-content">
        <section class="panel" [class.active]="activeTab() === 'tab-recipes'" id="tab-recipes">
          <app-pricing-recipes-tab></app-pricing-recipes-tab>
        </section>

        <section class="panel" [class.active]="activeTab() === 'tab-fixed'" id="tab-fixed">
          <app-pricing-fixed-costs-tab></app-pricing-fixed-costs-tab>
        </section>

        <section class="panel" [class.active]="activeTab() === 'tab-fees'" id="tab-fees">
          <app-pricing-fees-tab></app-pricing-fees-tab>
        </section>

        <section class="panel" [class.active]="activeTab() === 'tab-pricing'" id="tab-pricing">
          <app-pricing-pricing-tab></app-pricing-pricing-tab>
        </section>

        <section class="panel" [class.active]="activeTab() === 'tab-reports'" id="tab-reports">
          <app-pricing-reports-tab></app-pricing-reports-tab>
        </section>

        <section class="panel" [class.active]="activeTab() === 'tab-database'" id="tab-database">
          <app-pricing-database-tab></app-pricing-database-tab>
        </section>
      </main>
    </div>
  </div>
</div>

<div id="ficha-tecnica-print" class="ficha-tecnica-print" aria-hidden="true"></div>
<div id="helpTooltip" class="help-tooltip" role="tooltip" aria-hidden="true"></div>
