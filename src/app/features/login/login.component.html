<div class="login-page">
  <div class="login-container">
    <div class="login-header">
      <h1 class="login-title">Doces</h1>
      <p class="login-subtitle">Selecione seu perfil para continuar</p>
    </div>

    <div class="login-selector">
      <div class="login-selector-track">
        @for (item of selectorItems(); track $index) {
          @let offset = getOffset($index);
          @let isFocused = offset === 0;
          <button type="button"
            class="login-selector-item"
            [class.login-selector-item--focused]="isFocused"
            [class.login-selector-item--add]="item.type === 'add'"
            [style.--offset]="offset"
            [style.--abs-offset]="Math.abs(offset)"
            (click)="isFocused ? confirmFocused() : focusItem($index)">

            @if (item.type === 'user' && item.user) {
              <div class="login-avatar" [style.background]="item.user.avatarColor">
                <span class="login-avatar-initials">{{ getInitials(item.user.name) }}</span>
              </div>
              <span class="login-selector-name">{{ item.user.name }}</span>
            } @else {
              <div class="login-avatar login-avatar--add">
                <lucide-angular name="plus" [size]="28" aria-hidden="true"></lucide-angular>
              </div>
              <span class="login-selector-name">Novo</span>
            }
          </button>
        }
      </div>
    </div>

    @if (showNewUserForm()) {
      <div class="login-new-user-form">
        <div class="login-form-preview">
          <div class="login-form-avatar" [style.background]="newUserColor()">
            <span class="login-form-avatar-initials">{{ previewInitials() }}</span>
          </div>
        </div>

        <div class="login-form-field">
          <label class="login-form-label" for="new-user-name">Nome</label>
          <input
            type="text"
            id="new-user-name"
            class="login-new-user-input"
            placeholder="Digite o nome..."
            [ngModel]="newUserName()"
            (ngModelChange)="newUserName.set($event)"
            (keydown.enter)="confirmNewUser()"
            autofocus
          >
        </div>

        <div class="login-form-field">
          <label class="login-form-label">Cor do avatar</label>
          <div class="login-color-picker">
            @for (color of avatarColors; track color) {
              <button type="button"
                class="login-color-swatch"
                [class.login-color-swatch--active]="newUserColor() === color"
                [style.background]="color"
                (click)="selectColor(color)"
                [attr.aria-label]="'Cor ' + color">
                @if (newUserColor() === color) {
                  <lucide-angular name="check" [size]="14" aria-hidden="true"></lucide-angular>
                }
              </button>
            }
          </div>
        </div>

        <div class="login-new-user-actions">
          <button type="button" class="login-btn login-btn--secondary" (click)="cancelNewUser()">Cancelar</button>
          <button type="button" class="login-btn login-btn--primary" (click)="confirmNewUser()" [disabled]="!newUserName().trim()">
            <lucide-angular name="check" [size]="16" aria-hidden="true"></lucide-angular>
            Criar e entrar
          </button>
        </div>
      </div>
    }

    <p class="login-footer-text">Dados salvos localmente no navegador</p>
  </div>
</div>
